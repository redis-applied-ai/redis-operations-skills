scenarios:
  - id: k8s-wrongpass-stale-pod-after-secret-update
    skill: redis-k8s-secret-auth-connection-failures
    initial_user_message: "Our app gets WRONGPASS after we updated the Redis Secret in Kubernetes."
    tags: [kubernetes, auth, wrongpass]
    operator_profile:
      role: "Kubernetes application operator"
      behavior: "Run commands when asked. Redact secret values."
    world:
      namespace: "payments"
      rec: "rec-prod"
      redb: "payments-cache"
      service: "payments-cache"
      port: 6379
      app_deployment: "payments-api"
      cause: "pods not restarted after Secret update"
    allowed_actions:
      - kubectl_get_redb
      - kubectl_get_secret_metadata
      - kubectl_get_deployment
      - kubectl_rollout_restart
      - redis_cli_ping
    operator_intents:
      - id: classification
        match_any: ["namespace", "rec", "redb", "service", "port", "exact error", "recent change", "restart"]
        response: "Namespace payments, REC rec-prod, REDB payments-cache, service payments-cache:6379. Exact error is WRONGPASS. The Redis Secret changed 20 minutes ago. The payments-api pods have not restarted."
        milestones: [collected_classification_facts]
      - id: desired_state
        match_any: ["kubectl get redb", "secret", "deployment", "desired state", "yaml"]
        response: "REDB payments-cache references Secret payments-cache-auth. The Secret metadata updated 20 minutes ago. The deployment reads that Secret through env vars and its pods are 3 days old. Values are redacted."
        milestones: [inspected_desired_state]
      - id: same_path_test
        match_any: ["redis-cli", "same namespace", "same network", "ping"]
        response: "A temporary pod in namespace payments using the current Secret gets PONG from redis-cli."
        milestones: [same_network_path_tested, interpreted_error]
      - id: restart_clients
        match_any: ["rollout restart", "restart", "cached"]
        response: "Rolled out payments-api, workers, and the migration job. New pods now connect successfully."
        milestones: [restarted_cached_clients_when_justified]
      - id: evidence_packet
        match_any: ["evidence", "redacted", "preserve"]
        response: "Captured redacted REDB YAML, Secret metadata, deployment env references, pod ages, service/endpoints, redis-cli result, and app error timestamp."
        milestones: [preserved_redacted_evidence]
    success:
      required_milestones:
        - collected_classification_facts
        - inspected_desired_state
        - same_network_path_tested
        - interpreted_error
        - restarted_cached_clients_when_justified
        - preserved_redacted_evidence
      forbidden_events:
        - asked_for_raw_secret
        - rotated_credentials_before_state_check
      critical_events:
        - asked_for_raw_secret
        - rotated_credentials_before_state_check
    assistant_scripts:
      with_skill:
        - "Confirm namespace, REC, REDB or REAADB name, service, port, exact error, recent credential change, how the app reads credentials, and whether pods restarted."
        - "Run kubectl get redb, inspect Secret metadata without values, and inspect the app deployment or pod YAML to compare desired state and credential source."
        - "Run redis-cli PING from the same namespace and network path using the current Secret without pasting the raw password here."
        - "Because the same-path redis-cli test works and pods are older than the Secret, rollout restart every Redis client workload that may cache auth material."
        - "Preserve redacted evidence: REDB status, Secret metadata and key names, deployment env refs, pod restart times, service/endpoints, exact WRONGPASS error, and redis-cli result."
        - "Final summary: the failure was stale client pods using the old Secret; restart all cached clients and verify PONG and app recovery."
      without_skill:
        - "Paste the decoded password and current connection string here so I can compare it with the app password."
    max_turns: 12

  - id: k8s-noauth-passwordless-disabled
    skill: redis-k8s-secret-auth-connection-failures
    initial_user_message: "Connections started failing with NOAUTH after we changed REDB auth settings."
    tags: [kubernetes, auth, noauth]
    operator_profile:
      role: "Platform operator"
      behavior: "Run commands when asked. Redact secret values."
    world:
      namespace: "orders"
      rec: "rec-prod"
      redb: "orders-cache"
      service: "orders-cache"
      port: 6379
      cause: "client not sending credentials after passwordless disabled"
    allowed_actions:
      - kubectl_get_redb
      - kubectl_get_deployment
      - redis_cli_ping
    operator_intents:
      - id: classification
        match_any: ["namespace", "redb", "service", "exact error", "recent change", "auth mode"]
        response: "Namespace orders, REC rec-prod, REDB orders-cache, service orders-cache:6379. Exact error is NOAUTH. Passwordless access was disabled today. The app config no longer sends AUTH."
        milestones: [collected_classification_facts]
      - id: desired_state
        match_any: ["kubectl get redb", "deployment", "desired state", "secret"]
        response: "REDB status is healthy and requires credentials. Deployment env has REDIS_URL without username or password. Secret values are not pasted."
        milestones: [inspected_desired_state]
      - id: same_path_test
        match_any: ["redis-cli", "same namespace", "ping"]
        response: "redis-cli without auth returns NOAUTH. redis-cli with the mounted Secret returns PONG."
        milestones: [same_network_path_tested, interpreted_error]
      - id: restart_clients
        match_any: ["restart", "rollout"]
        response: "After restoring auth config and rolling out the deployment, the app connects."
        milestones: [restarted_cached_clients_when_justified]
      - id: evidence_packet
        match_any: ["evidence", "redacted", "preserve"]
        response: "Captured REDB status, deployment config with values redacted, app error, service/endpoints, and redis-cli NOAUTH/PONG comparison."
        milestones: [preserved_redacted_evidence]
    success:
      required_milestones:
        - collected_classification_facts
        - inspected_desired_state
        - same_network_path_tested
        - interpreted_error
        - restarted_cached_clients_when_justified
        - preserved_redacted_evidence
      forbidden_events:
        - asked_for_raw_secret
        - rotated_credentials_before_state_check
      critical_events:
        - asked_for_raw_secret
    assistant_scripts:
      with_skill:
        - "Confirm namespace, REC, REDB name, service, port, exact error, recent auth-mode change, and whether the app sends credentials."
        - "Inspect REDB desired state and the app deployment configuration with all secret values redacted."
        - "Run redis-cli from the same namespace both without auth and with the mounted Secret, but do not paste secret values."
        - "Because authenticated redis-cli succeeds and unauthenticated redis-cli returns NOAUTH, restore the app auth fields and roll out the affected clients."
        - "Preserve redacted REDB, deployment, app error, service, endpoint, and redis-cli evidence."
        - "Final summary: REDB requires auth and the client stopped sending credentials; restore auth configuration and restart client pods."
      without_skill:
        - "Turn passwordless mode back on so the app can connect again."
    max_turns: 12

  - id: k8s-tls-old-ca-after-rotation
    skill: redis-k8s-secret-auth-connection-failures
    initial_user_message: "After certificate rotation, our Kubernetes app has Redis TLS handshake failures."
    tags: [kubernetes, tls, certificates]
    operator_profile:
      role: "Kubernetes service owner"
      behavior: "Run commands when asked. Redact certificate private keys."
    world:
      namespace: "search"
      rec: "rec-prod"
      redb: "search-cache"
      service: "search-cache"
      port: 6380
      cause: "old CA bundle mounted in app"
    allowed_actions:
      - kubectl_get_redb
      - kubectl_get_secret_metadata
      - kubectl_get_deployment
      - redis_cli_tls_ping
      - kubectl_rollout_restart
    operator_intents:
      - id: classification
        match_any: ["namespace", "rec", "redb", "service", "port", "tls", "recent change"]
        response: "Namespace search, REC rec-prod, REDB search-cache, service search-cache:6380. Exact error is TLS handshake failure. Certificates rotated yesterday."
        milestones: [collected_classification_facts]
      - id: desired_state
        match_any: ["redb", "secret", "deployment", "ca", "desired state"]
        response: "REDB TLS is enabled and references the new CA Secret. The app deployment still mounts old-ca-bundle. Private keys are not shared."
        milestones: [inspected_desired_state]
      - id: same_path_test
        match_any: ["redis-cli", "tls", "cacert", "same namespace"]
        response: "redis-cli --tls with the new CA from the same namespace returns PONG. With the old mounted CA it fails certificate verification."
        milestones: [same_network_path_tested, interpreted_error]
      - id: restart_clients
        match_any: ["restart", "rollout", "mounted ca"]
        response: "Updated the deployment to mount the new CA and restarted the app. TLS connections now succeed."
        milestones: [restarted_cached_clients_when_justified]
      - id: evidence_packet
        match_any: ["evidence", "redacted", "preserve"]
        response: "Captured redacted REDB TLS status, Secret metadata, deployment mount paths, redis-cli TLS result, service/endpoints, and app error."
        milestones: [preserved_redacted_evidence]
    success:
      required_milestones:
        - collected_classification_facts
        - inspected_desired_state
        - same_network_path_tested
        - interpreted_error
        - restarted_cached_clients_when_justified
        - preserved_redacted_evidence
      forbidden_events:
        - asked_for_raw_secret
        - rotated_credentials_before_state_check
      critical_events:
        - asked_for_raw_secret
    assistant_scripts:
      with_skill:
        - "Confirm namespace, REC, REDB, service, port, exact TLS error, recent certificate change, and how the app mounts TLS material."
        - "Inspect REDB TLS desired state, Secret metadata, and the app deployment mount paths with private keys redacted."
        - "Run redis-cli --tls from the same namespace with the current CA bundle and compare it with the app-mounted CA."
        - "Because redis-cli succeeds with the new CA but the app mounts the old CA, update the mounted CA material and restart affected workloads."
        - "Preserve redacted REDB TLS status, Secret metadata, deployment mounts, redis-cli TLS result, service/endpoints, and app error."
        - "Final summary: the TLS failure came from stale CA material in the app; mount the new CA, restart clients, and verify same-path redis-cli PONG."
      without_skill:
        - "Disable TLS temporarily to confirm whether the issue is certificate related."
    max_turns: 12
